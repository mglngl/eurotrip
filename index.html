  .bg-terracotta { background: var(--terracotta); }

  .border-cream-3 { border-color: var(--cream-3); }
  .border-terracotta { border-color: var(--terracotta); }

  /* subtle paper texture */
  .paper {
    background-image:
      radial-gradient(rgba(14,31,58,0.025) 1px, transparent 1px),
      radial-gradient(rgba(14,31,58,0.02) 1px, transparent 1px);
    background-size: 18px 18px, 9px 9px;
    background-position: 0 0, 4px 4px;
  }

  .ticker-dash {
    background-image: linear-gradient(90deg, currentColor 50%, transparent 50%);
    background-size: 8px 1px;
    background-repeat: repeat-x;
    background-position: 0 50%;
  }

  .day-pill {
    transition: all 220ms cubic-bezier(.2,.7,.2,1);
  }

  .fade-key { animation: fadeKey 360ms cubic-bezier(.2,.7,.2,1); }
  @keyframes fadeKey {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .slide-in { animation: slideIn 420ms cubic-bezier(.2,.7,.2,1); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .scaleup { animation: scaleup 480ms cubic-bezier(.2,.7,.2,1); }
  @keyframes scaleup {
    from { opacity: 0; transform: scale(.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .progress-shimmer {
    background: linear-gradient(90deg, var(--terracotta) 0%, var(--terracotta-soft) 50%, var(--terracotta) 100%);
    background-size: 200% 100%;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }

  .scroll-thin::-webkit-scrollbar { width: 6px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(14,31,58,0.2); border-radius: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }

  /* divider with dots */
  .dotline {
    background-image: radial-gradient(circle, currentColor 1px, transparent 1.2px);
    background-size: 8px 8px;
    background-repeat: repeat-x;
    background-position: 0 50%;
    height: 8px;
  }

  @media (max-width: 900px) {
    .desktop-only { display: none !important; }
  }
  @media (min-width: 901px) {
    .mobile-only { display: none !important; }
  }

        {/* duomo dome */}
        <rect x="100" y="120" width="100" height="50" fill={ink}/>
        <path d="M100,120 Q150,60 200,120 Z" fill={accent}/>
        <rect x="146" y="60" width="8" height="12" fill={ink}/>
        {/* campanile */}
        <rect x="210" y="80" width="22" height="90" fill={ink}/>
        <rect x="216" y="92" width="4" height="10" fill={bg}/>
        <rect x="222" y="92" width="4" height="10" fill={bg}/>
        <rect x="216" y="112" width="4" height="10" fill={bg}/>
        <rect x="222" y="112" width="4" height="10" fill={bg}/>
        {/* cypress */}
        <ellipse cx="50" cy="140" rx="10" ry="30" fill={ink} opacity="0.8"/>
        <rect x="48" y="160" width="4" height="14" fill={ink}/>
        <ellipse cx="80" cy="145" rx="8" ry="25" fill={ink} opacity="0.8"/>
        <rect x="78" y="160" width="4" height="14" fill={ink}/>
        <rect x="0" y="170" width="320" height="50" fill={ink} opacity="0.15"/>
      </svg>
    ),
    "Rome": (
      <svg {...common}>
        <rect width="320" height="220" fill={bg}/>
        <circle cx="50" cy="50" r="22" fill={accent} opacity="0.7"/>
        {/* colosseum */}
        <ellipse cx="160" cy="140" rx="100" ry="50" fill={ink} opacity="0.92"/>
        <ellipse cx="160" cy="140" rx="100" ry="50" fill="none" stroke={bg} strokeWidth="1.5"/>
        {[...Array(10)].map((_, i) => {
          const x = 70 + i*20;
          return <rect key={i} x={x} y="120" width="8" height="14" fill={bg} rx="3"/>;
        })}
        {[...Array(11)].map((_, i) => {
          const x = 65 + i*18;
          return <rect key={i} x={x} y="142" width="6" height="10" fill={bg} rx="2"/>;
        })}
        <rect x="62" y="138" width="196" height="2" fill={bg}/>
        <rect x="0" y="180" width="320" height="40" fill={ink} opacity="0.15"/>
      </svg>
    ),
    "Fira": (
      <svg {...common}>
        <rect width="320" height="220" fill={bg}/>
        <circle cx="160" cy="80" r="40" fill={accent} opacity="0.85"/>
        {/* sea */}
        <rect x="0" y="140" width="320" height="80" fill={ink} opacity="0.45"/>
        {/* cliff */}
        <path d="M0,140 Q40,100 80,110 Q120,120 160,108 Q200,96 240,112 Q280,124 320,118 L320,140 Z" fill={bg}/>
        {/* white cubic houses */}
        {[20,50,80,110,140,170,200,230,260,290].map((x, i) => (
          <g key={i}>
            <rect x={x} y={108 - (i%3)*4} width="18" height="14" fill={bg} stroke={ink} strokeWidth="1"/>
            {i%2===0 && <ellipse cx={x+9} cy={108 - (i%3)*4} rx="9" ry="4" fill={accent} opacity="0.8"/>}
          </g>
        ))}
        <line x1="0" y1="160" x2="320" y2="160" stroke={bg} strokeWidth="1" opacity="0.5"/>
        <line x1="0" y1="180" x2="320" y2="180" stroke={bg} strokeWidth="1" opacity="0.4"/>
      </svg>
    ),
  };

  // for combo / transition cities, use the first one
  const fallbackKey = day.cities.find(c => scenes[c]) || "Amsterdam";
  return scenes[key] || scenes[fallbackKey];
}

/* =========================================================================
   SUB-COMPONENTS
   ========================================================================= */

function StatBlock({ label, value, suffix }) {
  return (
    <div className="flex flex-col">
      <span className="font-mono text-[10px] uppercase tracking-[0.18em] text-mute">{label}</span>
      <span className="font-display text-2xl md:text-3xl text-ink leading-none mt-1">
        {value}<span className="text-terracotta">{suffix}</span>
      </span>
    </div>
  );
}

function TopBar({ activeDay }) {
  return (
    <header className="border-b border-cream-3 bg-cream sticky top-0 z-30">
      <div className="max-w-[1400px] mx-auto px-5 md:px-8 py-3 md:py-4">
        <div className="flex items-center justify-between gap-4 flex-wrap">
          {/* logo */}
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-ink rounded-full flex items-center justify-center">
              <span className="text-cream font-display text-sm">€</span>
            </div>
            <div className="leading-tight">
              <div className="font-display text-lg text-ink">Eurotrip 2026</div>
              <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">Jun 04 — Jun 16 · 12 days</div>
            </div>
          </div>

          {/* stats */}
          <div className="flex items-center gap-6 md:gap-9 ml-auto">
            <StatBlock label="Countries" value={STATS.countries} />
            <StatBlock label="Cities" value={STATS.cities} />
            <StatBlock label="Transit Days" value={STATS.transitDays} />
            <StatBlock label="Distance" value={STATS.totalKm.toLocaleString()} suffix=" km" />
          </div>
        </div>
      </div>
    </header>
  );
}

function ProgressBar({ active, total }) {
  const pct = (active / total) * 100;
  return (
    <div className="w-full">
      <div className="flex items-center justify-between mb-2">
        <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">Trip Progress</span>
        <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">
          Day {active} / {total} · {Math.round(pct)}%
        </span>
      </div>
      <div className="relative h-[6px] bg-cream-3 rounded-full overflow-hidden">
        <div
          className="absolute inset-y-0 left-0 progress-shimmer rounded-full transition-all duration-500"
          style={{ width: `${pct}%` }}
        />
      </div>
      <div className="flex justify-between mt-1.5 px-[2px]">
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} className={`w-1 h-1 rounded-full transition-colors ${i < active ? 'bg-terracotta' : 'bg-cream-3'}`}/>
        ))}
      </div>
    </div>
  );
}

function DayPill({ day, isActive, onClick }) {
  return (
    <button
      onClick={onClick}
      className={`day-pill w-full text-left rounded-lg border px-3 py-2.5 flex items-center gap-3 group ${
        isActive
          ? 'bg-ink text-cream border-ink shadow-sm'
          : 'bg-transparent text-ink border-transparent hover:bg-cream-2 hover:border-cream-3'
      }`}
    >
      <div className={`w-9 h-9 rounded-md flex items-center justify-center font-mono text-[11px] font-medium shrink-0 ${
        isActive ? 'bg-cream text-ink' : 'bg-cream-2 text-ink-2 group-hover:bg-cream-3'
      }`}>
        D{String(day.day).padStart(2,'0')}
      </div>
      <div className="flex-1 min-w-0">
        <div className={`font-display text-[15px] leading-tight truncate ${isActive ? 'text-cream' : 'text-ink'}`}>
          {day.city}
        </div>
        <div className={`font-mono text-[10px] uppercase tracking-wider truncate ${isActive ? 'text-cream/60' : 'text-mute'}`}>
          {day.dateLabel}
        </div>
      </div>
      <div className="text-lg shrink-0">{day.glyph}</div>
      {day.isCombo && (
        <span className={`font-mono text-[8.5px] uppercase tracking-widest px-1.5 py-0.5 rounded ${
          isActive ? 'bg-terracotta text-cream' : 'bg-terracotta/10 text-terracotta'
        }`}>
          Combo
        </span>
      )}
    </button>
  );
}

function Sidebar({ activeIdx, setActiveIdx }) {
  return (
    <aside className="desktop-only w-[300px] shrink-0 border-r border-cream-3 bg-cream-2/50 paper">
      <div className="sticky top-[73px] h-[calc(100vh-73px)] overflow-y-auto scroll-thin">
        <div className="px-4 pt-5 pb-3">
          <div className="font-mono text-[10px] uppercase tracking-[0.22em] text-mute mb-3">Itinerary</div>
        </div>
        <div className="px-3 pb-6 space-y-1">
          {TRIP.map((day, i) => (
            <DayPill key={day.day} day={day} isActive={i === activeIdx} onClick={() => setActiveIdx(i)} />
          ))}
        </div>
        <div className="px-5 pb-8">
          <div className="dotline text-cream-3 mb-3"></div>
          <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">
            End of itinerary · safe travels
          </div>
        </div>
      </div>
    </aside>
  );
}

function MobileDayStrip({ activeIdx, setActiveIdx }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const el = ref.current.querySelector(`[data-i="${activeIdx}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, [activeIdx]);
  return (
    <div className="mobile-only border-b border-cream-3 bg-cream-2/50">
      <div ref={ref} className="flex gap-2 overflow-x-auto px-4 py-3 scroll-thin">
        {TRIP.map((d, i) => (
          <button
            key={d.day}
            data-i={i}
            onClick={() => setActiveIdx(i)}
            className={`shrink-0 px-3 py-2 rounded-md flex items-center gap-2 ${
              i === activeIdx ? 'bg-ink text-cream' : 'bg-cream-2 text-ink'
            }`}
          >
            <span className="font-mono text-[10px] uppercase">D{String(d.day).padStart(2,'0')}</span>
            <span className="font-display text-sm whitespace-nowrap">{d.cities[0]}</span>
            {d.isCombo && <span className="text-[8px] font-mono uppercase tracking-wider px-1 rounded bg-terracotta/20 text-terracotta">Combo</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

function HeroCard({ day }) {
  const [bg] = day.palette;
  return (
    <div className="relative rounded-2xl overflow-hidden border border-cream-3 scaleup" style={{ background: bg }}>
      <div className="absolute top-4 left-4 z-10 flex items-center gap-2">
        <span className="font-mono text-[10px] uppercase tracking-[0.22em] bg-ink text-cream px-2 py-1 rounded">
          Day {String(day.day).padStart(2,'0')}
        </span>
        {day.isCombo && (
          <span className="font-mono text-[10px] uppercase tracking-[0.22em] bg-terracotta text-cream px-2 py-1 rounded">
            Combo Day
          </span>
        )}
      </div>
      <div className="absolute top-4 right-4 z-10">
        <span className="font-mono text-[10px] uppercase tracking-[0.22em] text-ink-2 bg-cream/80 backdrop-blur px-2 py-1 rounded">
          {day.dateLabel}
        </span>
      </div>
      <div className="aspect-[16/9] w-full">
        <CityIllustration day={day} />
      </div>
    </div>
  );
}

function ComboSplit({ combo }) {
  return (
    <div className="grid grid-cols-2 gap-3 mt-4">
      {combo.map((c, i) => (
        <div key={i} className="border border-cream-3 rounded-xl p-4 bg-cream-2/40 flex items-center gap-3">
          <div className="w-12 h-12 bg-cream-3 rounded-lg flex items-center justify-center text-2xl shrink-0">
            {c.glyph}
          </div>
          <div className="min-w-0">
            <div className="font-display text-lg text-ink leading-tight">{c.name}</div>
            <div className="font-mono text-[10px] uppercase tracking-wider text-mute mt-0.5 truncate">{c.note}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function TransitInfo({ day, nextDay }) {
  if (!nextDay) {
    return (
      <div className="border border-cream-3 rounded-xl p-4 bg-cream-2/40">
        <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute mb-1">Final stop</div>
        <div className="font-display text-base text-ink">Trip complete · home sweet home</div>
      </div>
    );
  }
  const t = day.transit;
  const modeIcon = { Train: '🚆', Eurostar: '🚆', Flight: '✈️', 'Day trip': '🚆', Rest: '🛌' }[t.mode] || '→';
  return (
    <div className="border border-cream-3 rounded-xl p-4 bg-cream-2/40">
      <div className="flex items-center justify-between mb-2">
        <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">
          Onward · to {nextDay.cities[0]}
        </div>
        <span className="font-mono text-[10px] uppercase tracking-wider text-terracotta border border-terracotta/30 px-1.5 py-0.5 rounded">
          {t.mode}
        </span>
      </div>
      <div className="flex items-center gap-3">
        <div className="text-2xl">{modeIcon}</div>
        <div className="flex-1 min-w-0">
          <div className="font-display text-lg text-ink truncate">{t.line}</div>
          <div className="font-mono text-xs text-mute mt-0.5">Duration · {t.duration}</div>
        </div>
        <div className="hidden sm:flex items-center gap-1 text-mute">
          <span className="ticker-dash w-12 h-px"></span>
          <span className="text-lg">→</span>
        </div>
      </div>
    </div>
  );
}

function HighlightItem({ text, idx }) {
  return (
    <li className="flex items-start gap-3 group">
      <span className="font-mono text-[11px] text-terracotta mt-1 shrink-0 w-5">
        {String(idx + 1).padStart(2,'0')}
      </span>
      <span className="text-ink-2 text-[15px] leading-relaxed group-hover:text-ink transition">
        {text}
      </span>
    </li>
  );
}

function MainPanel({ activeIdx, setActiveIdx }) {
  const day = TRIP[activeIdx];
  const nextDay = TRIP[activeIdx + 1];
  const prevDay = TRIP[activeIdx - 1];

  return (
    <main className="flex-1 min-w-0">
      <div className="max-w-[920px] mx-auto px-5 md:px-8 py-6 md:py-8">

        {/* progress */}
        <div className="mb-7">
          <ProgressBar active={day.day} total={TRIP.length} />
        </div>

        {/* hero */}
        <div key={`hero-${day.day}`} className="fade-key">
          <HeroCard day={day} />
        </div>

        {/* title block */}
        <div key={`title-${day.day}`} className="slide-in mt-6 flex items-end justify-between gap-6 flex-wrap">
          <div className="min-w-0">
            <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-mute mb-2">
              {day.country} · Stop {activeIdx + 1} of {TRIP.length}
            </div>
            <h1 className="font-display text-5xl md:text-6xl text-ink leading-[0.95] tracking-tight">
              {day.city}
            </h1>
          </div>
          <div className="text-5xl md:text-6xl shrink-0">{day.glyph}</div>
        </div>

        {/* combo split */}
        {day.isCombo && day.combo && (
          <div key={`combo-${day.day}`} className="slide-in">
            <ComboSplit combo={day.combo} />
          </div>
        )}

        {/* summary */}
        <p key={`sum-${day.day}`} className="slide-in mt-6 text-ink-2 text-[17px] md:text-[18px] leading-[1.65] font-light max-w-[62ch]">
          {day.summary}
        </p>

        {/* dotline */}
        <div className="dotline text-cream-3 my-7"></div>

        {/* highlights + transit grid */}
        <div className="grid md:grid-cols-[1.4fr,1fr] gap-6">
          <section key={`hl-${day.day}`} className="slide-in">
            <div className="flex items-center gap-2 mb-4">
              <span className="font-mono text-[10px] uppercase tracking-[0.22em] text-mute">Highlights</span>
              <div className="flex-1 dotline text-cream-3"></div>
            </div>
            <ul className="space-y-3.5">
              {day.highlights.map((h, i) => <HighlightItem key={i} idx={i} text={h} />)}
            </ul>
          </section>

          <section key={`tr-${day.day}`} className="slide-in space-y-3">
            <div className="flex items-center gap-2 mb-1">
              <span className="font-mono text-[10px] uppercase tracking-[0.22em] text-mute">Transit</span>
              <div className="flex-1 dotline text-cream-3"></div>
            </div>
            <TransitInfo day={day} nextDay={nextDay} />
            {day.legKm > 0 && (
              <div className="flex items-center justify-between px-4 py-3 border border-cream-3 rounded-xl bg-cream">
                <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-mute">Leg distance</span>
                <span className="font-display text-base text-ink">{day.legKm.toLocaleString()} <span className="text-terracotta text-sm">km</span></span>
              </div>
            )}
          </section>
        </div>

        {/* nav */}
        <div className="mt-10 pt-6 border-t border-cream-3 flex items-center justify-between gap-4">
          <button
            onClick={() => prevDay && setActiveIdx(activeIdx - 1)}
            disabled={!prevDay}
            className={`group flex items-center gap-3 px-4 py-3 rounded-lg border transition ${
              prevDay
                ? 'border-cream-3 hover:border-ink hover:bg-cream-2 text-ink'
                : 'border-cream-3 text-mute opacity-40 cursor-not-allowed'
            }`}
          >
            <span className="text-lg group-hover:-translate-x-0.5 transition">←</span>
            <div className="text-left leading-tight">
              <div className="font-mono text-[9px] uppercase tracking-[0.22em] text-mute">Previous</div>
              <div className="font-display text-sm">{prevDay ? prevDay.cities[0] : 'Start of trip'}</div>
            </div>
          </button>

          <button
            onClick={() => nextDay && setActiveIdx(activeIdx + 1)}
            disabled={!nextDay}
            className={`group flex items-center gap-3 px-4 py-3 rounded-lg border transition ${
              nextDay
                ? 'border-ink bg-ink text-cream hover:bg-ink-2'
                : 'border-cream-3 text-mute opacity-40 cursor-not-allowed'
            }`}
            style={!nextDay ? {} : {}}
          >
            <div className="text-right leading-tight">
              <div className={`font-mono text-[9px] uppercase tracking-[0.22em] ${nextDay ? 'text-cream/60' : 'text-mute'}`}>
                Next stop
              </div>
              <div className="font-display text-sm">{nextDay ? nextDay.cities[0] : 'Trip complete'}</div>
            </div>
            <span className="text-lg group-hover:translate-x-0.5 transition">→</span>
          </button>
        </div>
      </div>
    </main>
  );
}

/* =========================================================================
   APP
   ========================================================================= */
function App() {
  const [activeIdx, setActiveIdx] = useState(0);

  // keyboard nav
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' && activeIdx < TRIP.length - 1) setActiveIdx(activeIdx + 1);
      if (e.key === 'ArrowLeft' && activeIdx > 0) setActiveIdx(activeIdx - 1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeIdx]);

  return (
    <div className="min-h-screen bg-cream paper">
      <TopBar activeDay={TRIP[activeIdx]} />
      <MobileDayStrip activeIdx={activeIdx} setActiveIdx={setActiveIdx} />
      <div className="flex max-w-[1400px] mx-auto">
        <Sidebar activeIdx={activeIdx} setActiveIdx={setActiveIdx} />
        <MainPanel activeIdx={activeIdx} setActiveIdx={setActiveIdx} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
