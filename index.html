<html lang="en">
<head>

<style>
  :root {
    --cream: #f6f1e7;
    --cream-2: #efe7d6;
    --cream-3: #e6dcc6;
    --ink: #0e1f3a;
    --ink-2: #1b2e4f;
    --terracotta: #c2542b;
    --terracotta-soft: #e08a5f;
    --mute: #6b6452;
  }
  html, body { background: var(--cream); color: var(--ink); }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .text-ink { color: var(--ink); }
  .text-ink-2 { color: var(--ink-2); }
  .text-mute { color: var(--mute); }
  .text-terracotta { color: var(--terracotta); }
  .text-cream { color: var(--cream); }
  .text-cream\/60 { color: rgba(246,241,231,0.6); }
  .text-cream\/80 { color: rgba(246,241,231,0.8); }
  .bg-cream { background: var(--cream); }
  .bg-cream-2 { background: var(--cream-2); }
  .bg-cream-3 { background: var(--cream-3); }
  .bg-ink { background: var(--ink); }
  .bg-terracotta { background: var(--terracotta); }
  .border-ink { border-color: var(--ink); }
  .border-cream-3 { border-color: var(--cream-3); }
  .border-terracotta { border-color: var(--terracotta); }

  .paper {
    background-image:
      radial-gradient(rgba(14,31,58,0.025) 1px, transparent 1px),
      radial-gradient(rgba(14,31,58,0.02) 1px, transparent 1px);
    background-size: 18px 18px, 9px 9px;
    background-position: 0 0, 4px 4px;
  }

  .ticker-dash {
    background-image: linear-gradient(90deg, currentColor 50%, transparent 50%);
    background-size: 8px 1px;
    background-repeat: repeat-x;
    background-position: 0 50%;
  }

  .day-pill { transition: all 220ms cubic-bezier(.2,.7,.2,1); }

  .fade-key { animation: fadeKey 360ms cubic-bezier(.2,.7,.2,1); }
  @keyframes fadeKey { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: slideIn 420ms cubic-bezier(.2,.7,.2,1); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
  .scaleup { animation: scaleup 480ms cubic-bezier(.2,.7,.2,1); }
  @keyframes scaleup { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }

  .progress-shimmer {
    background: linear-gradient(90deg, var(--terracotta) 0%, var(--terracotta-soft) 50%, var(--terracotta) 100%);
    background-size: 200% 100%;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }

  .scroll-thin::-webkit-scrollbar { width: 6px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(14,31,58,0.2); border-radius: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }

  .dotline {
    background-image: radial-gradient(circle, currentColor 1px, transparent 1.2px);
    background-size: 8px 8px;
    background-repeat: repeat-x;
    background-position: 0 50%;
    height: 8px;
  }

  /* expand/collapse */
  .expand-grid {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 380ms cubic-bezier(.2,.7,.2,1);
  }
  .expand-grid.open { grid-template-rows: 1fr; }
  .expand-inner { overflow: hidden; min-height: 0; }

  /* spoke line for hub-and-spoke sub-trips */
  .spoke {
    position: relative;
  }
  .spoke::before {
    content: "";
    position: absolute;
    left: -22px;
    top: 0;
    bottom: 50%;
    width: 1.5px;
    background: var(--terracotta);
    opacity: 0.55;
  }
  .spoke::after {
    content: "";
    position: absolute;
    left: -22px;
    top: 50%;
    width: 18px;
    height: 1.5px;
    background: var(--terracotta);
    opacity: 0.55;
  }
  .spoke.last::before { bottom: 50%; }
  .spoke-hub {
    position: absolute;
    left: -27px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--terracotta);
    border: 2px solid var(--cream);
    z-index: 1;
  }
  .spoke-trunk {
    position: absolute;
    left: -22px;
    top: 4px;
    width: 1.5px;
    background: var(--terracotta);
    opacity: 0.45;
  }

  @media (max-width: 900px) {
    .desktop-only { display: none !important; }
    .spoke::before, .spoke::after, .spoke-hub, .spoke-trunk { display: none; }
  }
  @media (min-width: 901px) {
    .mobile-only { display: none !important; }
  }
</style>
</head>

  const allCities = new Set();
  const countrySet = new Set();
  BASES.forEach(b => {
    allCities.add(b.city);

      countrySet.add(s.countryCode);

  return {
    countries: countrySet.size,
    cities: allCities.size,
    nights: totalNights,
    segments: SEGMENTS.length,
  };
})();

          <g key={i}>

            <polygon points={`${x},${110 - (i%2)*6} ${x+8},${100 - (i%2)*6} ${x+16},${110 - (i%2)*6} ${x+24},${100 - (i%2)*6} ${x+32},${110 - (i%2)*6}`} fill={ink}/>
          </g>
        ))}
        <rect x="0" y="180" width="320" height="40" fill={ink} opacity="0.15"/>
      </svg>
    ),
    "Florence": (
      <svg {...common}>
        <rect width="320" height="220" fill={bg}/>
        <circle cx="270" cy="50" r="22" fill={accent} opacity="0.75"/>
        <rect x="100" y="120" width="100" height="50" fill={ink}/>
        <path d="M100,120 Q150,60 200,120 Z" fill={accent}/>
        <rect x="146" y="60" width="8" height="12" fill={ink}/>
        <rect x="210" y="80" width="22" height="90" fill={ink}/>
        <rect x="216" y="92" width="4" height="10" fill={bg}/>
        <rect x="222" y="92" width="4" height="10" fill={bg}/>
        <rect x="216" y="112" width="4" height="10" fill={bg}/>
        <rect x="222" y="112" width="4" height="10" fill={bg}/>
        <ellipse cx="50" cy="140" rx="10" ry="30" fill={ink} opacity="0.8"/>
        <rect x="48" y="160" width="4" height="14" fill={ink}/>
        <ellipse cx="80" cy="145" rx="8" ry="25" fill={ink} opacity="0.8"/>
        <rect x="78" y="160" width="4" height="14" fill={ink}/>
        <rect x="0" y="170" width="320" height="50" fill={ink} opacity="0.15"/>
      </svg>
    ),
  };
  return scenes[key] || scenes["London"];
}

              <div className="font-display text-base text-ink">BA · 10h 30m</div>
            </div>
            <div className="ml-auto flex items-center gap-2">
              <span className="font-mono text-[10px] uppercase tracking-widest text-cream bg-terracotta px-2 py-1 rounded">Round-trip start</span>
              <a href="#" onClick={(e) => e.preventDefault()} className="font-mono text-[10px] uppercase tracking-widest text-cream bg-ink hover:bg-ink-2 px-3 py-1.5 rounded transition">Find times →</a>
            </div>
          </div>
        </div>

        {/* base cards interleaved with segments */}
        {BASES.map((base, i) => {
          const seg = SEGMENTS[i]; // segment AFTER this base, except for last
          const isActive = i === activeIdx;
          return (
            <React.Fragment key={base.id}>
              <div
                ref={el => { if (el) baseRefs.current[base.id] = el; }}
                className="mt-5 first:mt-0"
              >
                <BaseCard
                  base={base}
                  idx={i}
                  isExpanded={openSet.has(base.id)}
                  isActive={isActive}
                  onToggle={() => { toggleOpen(base.id); setActiveIdx(i); }}
                />
              </div>
              {seg && i < BASES.length - 1 && (
                <TransitSegment seg={seg} />
              )}
            </React.Fragment>
          );
        })}

        {/* departure segment (round-trip end) */}
        <div className="mt-5">
          <div className="flex items-center gap-2 mb-3">
            <span className="font-mono text-[10px] uppercase tracking-[0.22em] text-terracotta">▲ Outbound</span>
            <div className="flex-1 dotline text-cream-3"></div>
          </div>
          <div className="border border-cream-3 rounded-xl bg-cream-2/40 px-5 py-4 flex items-center gap-4 flex-wrap">
            <div className="w-12 h-12 rounded-lg bg-cream flex items-center justify-center border border-cream-3 shrink-0">
              <ModeIcon mode="plane" size={22} color="var(--ink)"/>
            </div>
            <div className="flex items-center gap-3 min-w-0">
              <div className="leading-tight">
                <div className="font-mono text-[9px] uppercase tracking-widest text-mute">LHR</div>
                <div className="font-display text-base text-ink">London</div>
              </div>
              <span className="text-terracotta text-lg font-display">→</span>
              <div className="leading-tight">
                <div className="font-mono text-[9px] uppercase tracking-widest text-mute">SAN</div>
                <div className="font-display text-base text-ink">San Diego</div>
              </div>
            </div>
            <div className="leading-tight">
              <div className="font-mono text-[9px] uppercase tracking-widest text-mute">Mode · Duration</div>
              <div className="font-display text-base text-ink">BA · 11h 15m</div>
            </div>
            <div className="ml-auto flex items-center gap-2">
              <span className="font-mono text-[10px] uppercase tracking-widest text-cream bg-terracotta px-2 py-1 rounded">Round-trip end</span>
              <a href="#" onClick={(e) => e.preventDefault()} className="font-mono text-[10px] uppercase tracking-widest text-cream bg-ink hover:bg-ink-2 px-3 py-1.5 rounded transition">Find times →</a>
            </div>
          </div>
        </div>

        {/* nav */}
        <div className="mt-10 pt-6 border-t border-cream-3 flex items-center justify-between gap-4">
          <button
            onClick={() => activeIdx > 0 && setActiveIdx(activeIdx - 1)}
            disabled={activeIdx === 0}
            className={`group flex items-center gap-3 px-4 py-3 rounded-lg border transition ${
              activeIdx > 0
                ? 'border-cream-3 hover:border-ink hover:bg-cream-2 text-ink'
                : 'border-cream-3 text-mute opacity-40 cursor-not-allowed'
            }`}
          >
            <span className="text-lg group-hover:-translate-x-0.5 transition">←</span>
            <div className="text-left leading-tight">
              <div className="font-mono text-[9px] uppercase tracking-[0.22em] text-mute">Previous base</div>
              <div className="font-display text-sm">{activeIdx > 0 ? BASES[activeIdx - 1].city : 'Start of trip'}</div>
            </div>
          </button>

          <button
            onClick={() => activeIdx < BASES.length - 1 && setActiveIdx(activeIdx + 1)}
            disabled={activeIdx === BASES.length - 1}
            className={`group flex items-center gap-3 px-4 py-3 rounded-lg border transition ${
              activeIdx < BASES.length - 1
                ? 'border-ink bg-ink text-cream hover:bg-ink-2'
                : 'border-cream-3 text-mute opacity-40 cursor-not-allowed'
            }`}
          >
            <div className="text-right leading-tight">
              <div className={`font-mono text-[9px] uppercase tracking-[0.22em] ${activeIdx < BASES.length - 1 ? 'text-cream/60' : 'text-mute'}`}>
                Next base
              </div>
              <div className="font-display text-sm">{activeIdx < BASES.length - 1 ? BASES[activeIdx + 1].city : 'Trip complete'}</div>
            </div>
            <span className="text-lg group-hover:translate-x-0.5 transition">→</span>
          </button>
        </div>
      </div>
    </main>
  );
}

/* =========================================================================
   APP
   ========================================================================= */
function App() {
  const [activeIdx, setActiveIdx] = useState(0);
  const [openSet, setOpenSet] = useState(() => new Set([BASES[0].id]));

  const toggleOpen = (id) => {
    setOpenSet(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' && activeIdx < BASES.length - 1) setActiveIdx(activeIdx + 1);
      if (e.key === 'ArrowLeft' && activeIdx > 0) setActiveIdx(activeIdx - 1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeIdx]);

  // when active changes via sidebar, ensure that base is open
  useEffect(() => {
    const id = BASES[activeIdx]?.id;
    if (id) {
      setOpenSet(prev => {
        if (prev.has(id)) return prev;
        const next = new Set(prev);
        next.add(id);
        return next;
      });
    }
  }, [activeIdx]);

  return (
    <div className="min-h-screen bg-cream paper">
      <TopBar />
      <MobileBaseStrip activeIdx={activeIdx} setActiveIdx={setActiveIdx} />
      <div className="flex max-w-[1400px] mx-auto">
        <Sidebar activeIdx={activeIdx} setActiveIdx={setActiveIdx} />
        <MainPanel activeIdx={activeIdx} setActiveIdx={setActiveIdx} openSet={openSet} toggleOpen={toggleOpen} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
